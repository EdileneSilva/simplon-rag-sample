# Base compose: development setup with hot reload and source bind mounts.
# Override for production with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: simplon_rag_postgres_pgvector
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rag}
      POSTGRES_USER: ${POSTGRES_USER:-rag_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag_password}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./api/data/db/init/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag_user} -d ${POSTGRES_DB:-rag}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./api
      target: dev
    container_name: simplon_rag_api
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./api/.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-rag}
      POSTGRES_USER: ${POSTGRES_USER:-rag_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag_password}
      APP_ENV: development
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:4173,http://localhost:8501"
      OLLAMA_BASE_URL: http://172.17.0.1:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
      - api_data_docs:/app/data/docs
      - api_data_eval:/app/data/evaluation
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - default
      - observability

  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: simplon_rag_frontend
    depends_on:
      api:
        condition: service_healthy
    environment:
      RAG_API_URL: "http://api:8000"
      RAG_API_TIMEOUT_SECONDS: "${RAG_API_TIMEOUT_SECONDS:-3000}"
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/app
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Observability stack
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.4.0
    container_name: simplon_rag_prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      # Rétention 15 jours, suffisant pour le projet
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - observability

  grafana:
    image: grafana/grafana:11.6.1
    container_name: simplon_rag_grafana
    environment:
      # Désactive l'auth en dev pour ne pas perdre de temps
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      # Timezone cohérente avec les logs
      GF_DEFAULT_APP_MODE: development
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - observability

volumes:
  pgdata:
  api_data_docs:
  api_data_eval:
  prometheus_data:
  grafana_data:

# Le réseau observability est créé manuellement une seule fois :
#   docker network create observability
networks:
  observability:
    external: true