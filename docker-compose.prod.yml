# Production overrides: no source bind mounts, no hot reload, multi-worker API,
# postgres port not exposed on the host.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  postgres:
    ports: !reset []
    restart: always

  api:
    build:
      target: prod
    environment:
      APP_ENV: production
    volumes: !override
      - api_data_docs:/app/data/docs
      - api_data_eval:/app/data/evaluation
    restart: always

  frontend:
    build:
      target: prod
      args:
        PUBLIC_API_URL: "${PUBLIC_API_URL:-http://localhost:8000}"
    ports: !override
      - "4173:80"
    volumes: !override []
    restart: always
