global:
  scrape_interval: 15s       # Fréquence de collecte des métriques
  evaluation_interval: 15s   # Fréquence d'évaluation des règles d'alerte
  scrape_timeout: 10s

  # Labels ajoutés à toutes les séries pour identifier l'environnement
  external_labels:
    project: "simplon-rag"
    env: "development"

# Fichiers de règles d'alerte (Phase 3)
# rule_files:
#   - /etc/prometheus/rules.yml

scrape_configs:
  # ------------------------------------------------------------------
  # API FastAPI — expose /metrics après ajout de prometheus-client
  # (Phase 2). En attendant, Prometheus scrape sans trouver de données
  # mais la cible apparaît quand même comme UP si /api/v1/health répond.
  # ------------------------------------------------------------------
  - job_name: "simplon-rag-api"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "api:8000"
        labels:
          service: "api"

  # ------------------------------------------------------------------
  # Auto-scrape de Prometheus lui-même (utile pour débugger)
  # ------------------------------------------------------------------
  - job_name: "prometheus"
    static_configs:
      - targets:
          - "localhost:9090"