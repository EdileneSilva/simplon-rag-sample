apiVersion: 1

providers:
  - name: simplon-rag-dashboards
    type: file
    disableDeletion: true     # Empêche la suppression via l'UI
    updateIntervalSeconds: 30 # Recharge les JSON modifiés sur disque toutes les 30s
    allowUiUpdates: false     # Les modifs UI ne persistent pas (source of truth = fichier)
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true